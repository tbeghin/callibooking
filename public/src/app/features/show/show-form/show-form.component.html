<section class="container">
  <h1>Ajouter un nouveau spectacle</h1>
  <form class="flex-col form-create" [formGroup]="showFormGroup" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label>Date de la représentation</mat-label>
      <input matInput [matDatepicker]="picker" [formControl]="dateControl">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <div class="flex-row form-select">
      <mat-form-field>
        <mat-label>Sélectionner la pièce</mat-label>
        <mat-select>
          <mat-option value="one">First option</mat-option>
          <mat-option value="two">Second option</mat-option>
        </mat-select>
      </mat-form-field>
      <div class="add-button">
        <button mat-mini-fab color="primary" (click)="showNewPiece = !showNewPiece" *ngIf="!showNewPiece">
          <mat-icon>add</mat-icon>
        </button>
        <button mat-mini-fab color="primary" (click)="showNewPiece = !showNewPiece" *ngIf="showNewPiece">
          <mat-icon>remove</mat-icon>
        </button>
      </div>
    </div>
    <div *ngIf="showNewPiece" class="flex-col">
      <mat-form-field>
        <mat-label>Titre de la pièce</mat-label>
        <input matInput type="text" [formControl]="pieceTitleControl">
      </mat-form-field>
      <mat-form-field>
        <mat-label>Description</mat-label>
        <textarea matInput [formControl]="pieceDescriptionControl"></textarea>
      </mat-form-field>
    </div>
    <div class="flex-row form-select">
      <mat-form-field>
        <mat-label>Sélectionner le théâtre</mat-label>
        <mat-select>
          <mat-option value="one">First option</mat-option>
          <mat-option value="two">Second option</mat-option>
        </mat-select>
      </mat-form-field>
      <div class="add-button">
        <button mat-mini-fab color="primary" (click)="showNewTheater = !showNewTheater" *ngIf="!showNewTheater">
          <mat-icon>add</mat-icon>
        </button>
        <button mat-mini-fab color="primary" (click)="showNewTheater = !showNewTheater" *ngIf="showNewTheater">
          <mat-icon>remove</mat-icon>
        </button>
      </div>
    </div>
    <div *ngIf="showNewTheater" class="flex-col">
      <mat-form-field>
        <mat-label>Nom de la salle</mat-label>
        <input matInput [formControl]="theaterNameControl">
      </mat-form-field>
    </div>
    <div class="flex action">
      <button mat-raised-button color="primary" type="submit" [disabled]="showFormGroup.invalid">Enregister</button>
    </div>
  </form>
</section>
